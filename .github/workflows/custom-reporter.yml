name: Custom Reporter Options

on:
  workflow_dispatch:
    inputs:
      show_mode:
        description: "What to show in the report"
        type: choice
        options:
          - all_tests
          - failed_only
          - summary_only
        default: all_tests

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Report - show all tests
        uses: dorny/test-reporter@v1
        if: ${{ !cancelled() && github.event.inputs.show_mode == 'all_tests' }}
        with:
          name: JEST Tests - Full Report
          path: reports/jest-junit.xml
          reporter: jest-junit
          list-suites: 'all'
          list-tests: 'all'
          list-files: 'all'
          only-summary: 'false'
          collapsed: 'never'
          max-annotations: '50'
          report-title: 'Complete Test Results'
          badge-title: 'tests'

      - name: Report - show failed only
        uses: dorny/test-reporter@v1
        if: ${{ !cancelled() && github.event.inputs.show_mode == 'failed_only' }}
        with:
          name: JEST Tests - Failures Only
          path: reports/jest-junit.xml
          reporter: jest-junit
          list-suites: 'failed'
          list-tests: 'failed'
          list-files: 'failed'
          only-summary: 'false'
          collapsed: 'auto'
          max-annotations: '10'
          report-title: 'Failed Tests Only'

      - name: Report - summary only
        uses: dorny/test-reporter@v1
        if: ${{ !cancelled() && github.event.inputs.show_mode == 'summary_only' }}
        with:
          name: JEST Tests - Summary
          path: reports/jest-junit.xml
          reporter: jest-junit
          only-summary: 'true'
          report-title: 'Test Summary'