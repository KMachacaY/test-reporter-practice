name: Basic Test Reporter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: ${{ !cancelled() }}
        with:
          name: JEST Tests
          path: reports/jest-junit.xml
          reporter: jest-junit
          fail-on-error: 'true'