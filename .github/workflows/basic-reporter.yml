name: Basic Test Reporter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: ${{ !cancelled() }}
        id: test-report
        with:
          name: JEST Tests
          path: reports/jest-junit.xml
          reporter: jest-junit
          fail-on-error: 'false'

      - name: Print test results summary
        if: ${{ !cancelled() }}
        run: |
          echo "====== TEST RESULTS SUMMARY ======"
          echo "Conclusion: ${{ steps.test-report.outputs.conclusion }}"
          echo "Passed:     ${{ steps.test-report.outputs.passed }}"
          echo "Failed:     ${{ steps.test-report.outputs.failed }}"
          echo "Skipped:    ${{ steps.test-report.outputs.skipped }}"
          echo "Duration:   ${{ steps.test-report.outputs.time }}ms"
          echo "Report URL: ${{ steps.test-report.outputs.url_html }}"

      - name: Fail job if tests failed
        if: steps.test-report.outputs.conclusion == 'failure'
        run: |
          echo "Tests failed! Failing the job."
          exit 1